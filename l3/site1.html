<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="split-layout">
        <div class="left-side form1-bg" style="background-image: url('https://github.com/steminist-ua/dstu/blob/master/pzs/internet_programming/l3/assects/side_background.png?raw=true');">
            <div class="social-buttons">
                <button class="social-btn"><img src="https://cdn-icons-png.flaticon.com/512/174/174857.png" alt="in"> Sign up with LinkedIn</button>
                <button class="social-btn"><img src="https://cdn-icons-png.flaticon.com/512/3256/3256013.png" alt="tw"> Sign up with Twitter</button>
                <button class="social-btn"><img src="https://cdn-icons-png.flaticon.com/512/124/124010.png" alt="fb"> Sign up with Facebook</button>
            </div>
        </div>

        <div class="right-side">
            <div class="form-container">
                <h1 class="form-title">Sign Up</h1>
                <p class="form-subtitle">Get started absolutely free</p>

                <form action="site2.html">
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" required>
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" required>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="terms" required>
                        <label for="terms">Creating an account means you're okay with our Terms of Service, Privacy Policy, and default Notification Settings</label>
                    </div>
                    <button type="submit" class="primary-btn">Sign up</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
